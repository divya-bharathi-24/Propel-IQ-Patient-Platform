name: CI — PR Quality Gates

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel any in-flight run for the same PR branch to avoid duplicate work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 1 — Angular Lint
  # ─────────────────────────────────────────────────────────────────────────────
  lint-angular:
    name: Angular Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Run Angular lint
        run: npx ng lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 2 — Angular Production Build
  # Depends on lint-angular to ensure a linting clean state first.
  # ─────────────────────────────────────────────────────────────────────────────
  build-angular:
    name: Angular Production Build
    runs-on: ubuntu-latest
    needs: lint-angular
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build Angular application (production)
        run: npx ng build --configuration production

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 3 — .NET Build + xUnit Unit Tests
  # Runs in parallel with Gate 1/2 to reduce overall pipeline time.
  # ─────────────────────────────────────────────────────────────────────────────
  build-test-dotnet:
    name: .NET Build and Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build solution (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run xUnit unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 4 — Playwright E2E Smoke Tests
  # Requires both Angular and .NET gates to pass before executing.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-playwright:
    name: Playwright E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-angular, build-test-dotnet]
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E smoke tests (Chromium)
        run: npx playwright test --project=chromium
        env:
          CI: true

      # Upload report even when tests fail so engineers can inspect failures.
      - name: Upload Playwright HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate 5 — TLS Enforcement Smoke Tests (NFR-005, AC-4)
  # Verifies Railway-deployed API rejects TLS 1.1 and accepts TLS 1.2.
  # Skipped when API_DOMAIN secret is not configured (e.g., forks / first-boot).
  # Runs only after all other gates pass to avoid wasted effort on broken builds.
  # ─────────────────────────────────────────────────────────────────────────────
  tls-smoke-test:
    name: TLS Enforcement Smoke Tests
    runs-on: ubuntu-latest
    needs: [e2e-playwright]
    # Skip gracefully when the Railway domain variable is not yet configured.
    if: ${{ vars.API_DOMAIN != '' }}
    steps:
      - name: Verify TLS 1.1 is rejected (AC-4)
        # openssl s_client exits 0 even on handshake failure, so we check the output.
        # A "CONNECTED" string in the output means TLS 1.1 was accepted — that is a failure.
        run: |
          result=$(openssl s_client -connect "${{ vars.API_DOMAIN }}:443" -tls1_1 </dev/null 2>&1 || true)
          if echo "$result" | grep -q "CONNECTED"; then
            echo "ERROR: TLS 1.1 was accepted by the server — this violates NFR-005 (AC-4)."
            exit 1
          fi
          echo "PASS: TLS 1.1 rejected as expected."

      - name: Verify TLS 1.2 is accepted (AC-4)
        run: |
          result=$(openssl s_client -connect "${{ vars.API_DOMAIN }}:443" -tls1_2 </dev/null 2>&1 || true)
          if ! echo "$result" | grep -q "CONNECTED"; then
            echo "ERROR: TLS 1.2 was not accepted — server may be misconfigured."
            exit 1
          fi
          echo "PASS: TLS 1.2 accepted as expected."

      - name: Verify HSTS header present on HTTPS response (AC-4)
        run: |
          headers=$(curl -sI --max-time 10 "https://${{ vars.API_DOMAIN }}/health" 2>&1 || true)
          if ! echo "$headers" | grep -qi "strict-transport-security"; then
            echo "ERROR: Strict-Transport-Security header missing from HTTPS response."
            exit 1
          fi
          echo "PASS: Strict-Transport-Security header is present."

      - name: Verify DATABASE_CONNECTION_STRING not committed (AC-4)
        # Fail the pipeline if any real Neon host credential appears in tracked files.
        run: |
          if git grep -r "neon\.tech" -- "*.json" "*.env" "*.yml" "*.yaml" "*.cs" 2>/dev/null | grep -v "tls-verification.md"; then
            echo "ERROR: Potential Neon connection string found in committed files."
            exit 1
          fi
          echo "PASS: No committed Neon credentials detected."
