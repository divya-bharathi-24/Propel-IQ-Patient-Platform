<main class="audit-log-container" role="main" aria-labelledby="audit-log-title">
  <header class="page-header">
    <h1 id="audit-log-title">Audit Log</h1>
    <p class="page-subtitle">
      Read-only record of all user actions on patient data (HIPAA-compliant).
    </p>
  </header>

  <!-- Filter Panel (AC-2) -->
  <app-audit-filter-panel
    (filtersApplied)="onFiltersApplied($event)"
    (filtersCleared)="onFiltersCleared()"
  />

  <!-- Error State -->
  @if (store.errorMessage()) {
  <div class="error-message" role="alert" aria-live="assertive">
    {{ store.errorMessage() }}
  </div>
  }

  <!-- Event Table deferred until viewport — keeps audit filter panel eagerly rendered
       so users can set filters before the heavy table is loaded (NFR-012 / CLS <0.1) -->
  @defer (on viewport) {
  <!-- Event Table (AC-1, AC-3) -->
  <app-audit-event-table
    [events]="store.events()"
    [loading]="store.loading()"
    [nextCursor]="store.nextCursor()"
    [totalCount]="store.totalCount()"
  />
  } @placeholder {
  <!-- Fixed height prevents CLS while the table is being loaded (NFR-012 / CLS <0.1) -->
  <div
    class="audit-table-placeholder"
    style="height: 400px"
    aria-busy="true"
    aria-label="Loading audit event table"
  >
    <mat-spinner diameter="40" />
  </div>
  }
</main>
