<main
  class="user-management-container"
  role="main"
  aria-labelledby="user-management-title"
>
  <header class="page-header">
    <h1 id="user-management-title">User Management</h1>
    <button
      mat-flat-button
      color="primary"
      type="button"
      (click)="openCreateUserDialog()"
      aria-label="Create a new user account"
    >
      <mat-icon aria-hidden="true">person_add</mat-icon>
      Create User
    </button>
  </header>

  <!-- Loading state -->
  @if (store.loadingState() === 'loading') {
  <div
    class="loading-container"
    role="status"
    aria-live="polite"
    aria-label="Loading users…"
  >
    <mat-spinner diameter="48"></mat-spinner>
  </div>
  }

  <!-- Error state -->
  @if (store.loadingState() === 'error') {
  <div class="load-error" role="alert" aria-live="assertive">
    {{ store.errorMessage() }}
    <button mat-button type="button" (click)="store.loadUsers()">Retry</button>
  </div>
  }

  <!-- User table -->
  @if (store.loadingState() !== 'loading') {
  <app-user-table
    [users]="store.users()"
    [currentAdminId]="currentAdminId()"
    (editUser)="onEditUser($event)"
    (deactivateUser)="onDeactivateUser($event)"
    (resendEmail)="onResendEmail($event)"
    (changeRole)="onChangeRole($event)"
  />
  }
</main>
