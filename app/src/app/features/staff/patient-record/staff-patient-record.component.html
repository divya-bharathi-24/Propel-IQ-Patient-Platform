<main class="patient-record-page" aria-label="Patient record">
  @if (patientId) {
    <!-- Review Codes action (US_043) -->
    <div class="record-actions">
      <a
        mat-raised-button
        color="accent"
        [routerLink]="['/staff/patients', patientId, 'medical-codes']"
        aria-label="Review AI-suggested medical codes for this patient"
      >
        <mat-icon aria-hidden="true">fact_check</mat-icon>
        Review Codes
      </a>
    </div>

    <div class="record-layout">
      <!-- Upload panel -->
      <app-staff-note-upload
        [patientId]="patientId"
        (uploadComplete)="onUploadComplete()"
      />

      <!-- Document history -->
      <app-document-history-list [patientId]="patientId" />
    </div>
  } @else {
    <p class="error-state" role="alert">
      Patient ID is missing. Please navigate from the patient list.
    </p>
  }
</main>
