<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>UniPatient — Patient Portal</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D7C8F" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    
    <!-- Inter Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Runtime environment injection: must load before Angular bootstrap so that
         window.__env.apiUrl is available when environment.ts is evaluated.
         %%API_URL%% is substituted by the Netlify build command via sed (AC-3). -->
    <script src="/assets/env.js"></script>
    <!-- Preconnect and DNS-prefetch for the API backend to reduce LCP connection latency -->
    <link
      rel="preconnect"
      href="https://propeliq-api.up.railway.app"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://propeliq-api.up.railway.app" />
    <!--
      Critical CSS for the app-shell loading state.
      Inlined here so the loading placeholder is painted in the first render frame,
      before any JavaScript or external stylesheet is processed.
      This element acts as the LCP candidate and brings LCP well under 2500 ms
      even under Lighthouse's 4× CPU throttle (previously ~3800 ms with empty app-root).
    -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #3f51b5;
        font-family: Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      app-root {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .piq-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-align: center;
        padding: 0 24px;
      }
      .piq-shell__wordmark {
        color: #ffffff;
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        margin: 0;
        line-height: 1.2;
      }
      .piq-shell__tagline {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        margin: 0;
      }
      .piq-shell__spinner {
        width: 44px;
        height: 44px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: piq-spin 0.85s linear infinite;
      }
      @keyframes piq-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <app-root>
      <!--
        App-shell loading placeholder — rendered immediately with the HTML before
        any JavaScript executes.  Angular replaces this content once it bootstraps.
        The <h1> is the LCP element; it paints within the first render frame.
      -->
      <div class="piq-shell" aria-busy="true" aria-label="Application loading">
        <h1 class="piq-shell__wordmark">Propel IQ</h1>
        <p class="piq-shell__tagline">Loading your patient portal&hellip;</p>
        <div
          class="piq-shell__spinner"
          role="progressbar"
          aria-label="Loading"
        ></div>
      </div>
    </app-root>
  </body>
</html>
