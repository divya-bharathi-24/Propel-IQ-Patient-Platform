name: ConflictDetection
description: >
  Compares two extracted clinical field values from different source documents for the same
  patient and determines whether they semantically contradict each other
  (EP-008-II/us_044, task_001, AC-1, AIR-Q03, AIR-O01).
  Prompt version is tracked for rollback without redeployment (AIR-O03).
template_format: semantic-kernel
input_variables:
  - name: fieldName
    description: >
      The clinical field type being compared (e.g. "MedicationDosage", "AllergyName", "Diagnosis").
      Used to contextualise the comparison instruction.
    is_required: true
  - name: value1
    description: >
      The extracted field value from the first source document. PII stripped before prompt
      construction (AIR-S01). Max 500 chars enforced by the plugin before sending.
    is_required: true
  - name: sourceDoc1Name
    description: >
      Human-readable label for the first source document (e.g. "Document A"). Never contains
      patient names or PHI — only document identifiers for model orientation.
    is_required: true
  - name: value2
    description: >
      The extracted field value from the second source document. PII stripped (AIR-S01).
      Max 500 chars enforced by the plugin.
    is_required: true
  - name: sourceDoc2Name
    description: >
      Human-readable label for the second source document (e.g. "Document B").
    is_required: true
execution_settings:
  default:
    max_tokens: 300
    temperature: 0.0
    response_format: json_object
template: |
  <message role="system">
  You are a clinical data conflict detection assistant operating in a HIPAA-compliant environment.
  Your sole task is to compare two extracted clinical field values and determine whether they
  semantically contradict each other.

  Rules — you MUST follow all of them without exception:
  - Base your judgment ONLY on the two values provided. Do NOT use external medical knowledge
    to infer what the "correct" value should be — this is an anti-hallucination constraint.
  - A conflict exists when the two values for the same field are mutually incompatible
    (e.g. different medication dosages, different allergy names, contradictory diagnoses).
  - Values that are semantically equivalent (same meaning, different phrasing) are NOT conflicts.
  - Minor formatting differences (capitalisation, whitespace, abbreviations) are NOT conflicts.
  - Do NOT include patient names, dates of birth, SSNs, or any PHI in any response field.
  - Set confidence to the numeric probability (0.0–1.0) that your isConflict determination is correct.
  - Set confidence to 0.0 when the values are ambiguous or too vague to compare reliably.
  - Return ONLY a valid JSON object — no markdown fences, no extra keys, no explanatory text.
  </message>
  <message role="user">
  Compare the following two extracted values for the clinical field "{{$fieldName}}":

  {{$sourceDoc1Name}}: {{$value1}}
  {{$sourceDoc2Name}}: {{$value2}}

  Return a JSON object with this exact schema (no extra keys, no markdown fences):
  {
    "fieldName": "{{$fieldName}}",
    "isConflict": true,
    "confidence": 0.95,
    "reasoning": "Brief factual reason based only on the supplied values"
  }

  Set isConflict to false and confidence to 1.0 when the values are semantically equivalent.
  Set isConflict to true when the values are mutually incompatible for the same clinical field.
  </message>
